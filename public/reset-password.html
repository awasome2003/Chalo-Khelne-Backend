<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        background-color: #f7f9fc;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 450px;
        padding: 0 20px;
      }

      .card {
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }

      .card-header {
        background-color: #f4511e;
        color: white;
        padding: 25px 30px;
        text-align: center;
      }

      .card-header h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .card-header p {
        font-size: 14px;
        opacity: 0.9;
      }

      .card-body {
        padding: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #555;
      }

      .form-control {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #e1e5eb;
        border-radius: 6px;
        font-size: 15px;
        transition: border-color 0.2s;
        background-color: #f9fafb;
      }

      .form-control:focus {
        border-color: #f4511e;
        outline: none;
        box-shadow: 0 0 0 3px rgba(244, 81, 30, 0.1);
      }

      .password-input-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
        cursor: pointer;
        background: none;
        border: none;
        font-size: 16px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        background-color: #f4511e;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 30px;
      }

      .btn:hover {
        background-color: #e23e0e;
      }

      .message {
        margin-top: 20px;
        padding: 12px 15px;
        border-radius: 6px;
        font-size: 14px;
        display: none;
      }

      .message.error {
        background-color: #ffebee;
        color: #d32f2f;
        border: 1px solid #ffcdd2;
        display: block;
      }

      .message.success {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #c8e6c9;
        display: block;
      }

      .password-requirements {
        margin-top: 15px;
        padding: 12px 15px;
        background-color: #f9fafb;
        border-radius: 6px;
        font-size: 13px;
      }

      .password-requirements h4 {
        font-size: 14px;
        margin-bottom: 8px;
        color: #555;
      }

      .requirement {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        color: #777;
      }

      .requirement.valid {
        color: #2e7d32;
      }

      .requirement i {
        margin-right: 8px;
        font-size: 12px;
      }

      .loader {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin-right: 10px;
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn.loading .loader {
        display: inline-block;
      }

      .brand-logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .brand-logo img {
        height: 40px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-header">
          <h1>Reset Your Password</h1>
          <p>Create a new secure password for your account</p>
        </div>

        <div class="card-body">
          <div id="resetForm">
            <div class="form-group">
              <label for="password" class="form-label">New Password</label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Enter new password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  id="togglePassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="password-requirements">
              <h4>Password must:</h4>
              <div class="requirement" id="length-check">
                <i class="far fa-circle"></i> Be at least 6 characters long
              </div>
              <div class="requirement" id="letter-check">
                <i class="far fa-circle"></i> Include at least one letter
              </div>
              <div class="requirement" id="number-check">
                <i class="far fa-circle"></i> Include at least one number
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword" class="form-label"
                >Confirm Password</label
              >
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="confirmPassword"
                  class="form-control"
                  placeholder="Confirm new password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  id="toggleConfirmPassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div id="message" class="message"></div>

            <button id="resetBtn" class="btn">
              <span class="loader"></span>
              <span class="btn-text">Reset My Password</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const resetBtn = document.getElementById("resetBtn");
        const message = document.getElementById("message");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const togglePassword = document.getElementById("togglePassword");
        const toggleConfirmPassword = document.getElementById(
          "toggleConfirmPassword"
        );

        // Password requirement indicators
        const lengthCheck = document.getElementById("length-check");
        const letterCheck = document.getElementById("letter-check");
        const numberCheck = document.getElementById("number-check");

        // Get token from URL
        const urlParts = window.location.pathname.split("/");
        const token = urlParts[urlParts.length - 1];

        // Toggle password visibility
        togglePassword.addEventListener("click", function () {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);
          togglePassword.innerHTML =
            type === "password"
              ? '<i class="fas fa-eye"></i>'
              : '<i class="fas fa-eye-slash"></i>';
        });

        toggleConfirmPassword.addEventListener("click", function () {
          const type =
            confirmPasswordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          confirmPasswordInput.setAttribute("type", type);
          toggleConfirmPassword.innerHTML =
            type === "password"
              ? '<i class="fas fa-eye"></i>'
              : '<i class="fas fa-eye-slash"></i>';
        });

        // Check password requirements in real-time
        passwordInput.addEventListener("input", function () {
          const value = passwordInput.value;

          // Check length
          if (value.length >= 6) {
            lengthCheck.classList.add("valid");
            lengthCheck.innerHTML =
              '<i class="fas fa-check-circle"></i> Be at least 6 characters long';
          } else {
            lengthCheck.classList.remove("valid");
            lengthCheck.innerHTML =
              '<i class="far fa-circle"></i> Be at least 6 characters long';
          }

          // Check for letters
          if (/[a-zA-Z]/.test(value)) {
            letterCheck.classList.add("valid");
            letterCheck.innerHTML =
              '<i class="fas fa-check-circle"></i> Include at least one letter';
          } else {
            letterCheck.classList.remove("valid");
            letterCheck.innerHTML =
              '<i class="far fa-circle"></i> Include at least one letter';
          }

          // Check for numbers
          if (/\d/.test(value)) {
            numberCheck.classList.add("valid");
            numberCheck.innerHTML =
              '<i class="fas fa-check-circle"></i> Include at least one number';
          } else {
            numberCheck.classList.remove("valid");
            numberCheck.innerHTML =
              '<i class="far fa-circle"></i> Include at least one number';
          }
        });

        resetBtn.addEventListener("click", async function () {
          const password = passwordInput.value;
          const confirmPassword = confirmPasswordInput.value;

          // Clear previous messages
          message.innerHTML = "";
          message.className = "message";

          // Validate input
          if (!password || !confirmPassword) {
            message.textContent = "Please fill in all fields";
            message.className = "message error";
            return;
          }

          if (password.length < 6) {
            message.textContent = "Password must be at least 6 characters long";
            message.className = "message error";
            return;
          }

          if (!/[a-zA-Z]/.test(password) || !/\d/.test(password)) {
            message.textContent =
              "Password must include at least one letter and one number";
            message.className = "message error";
            return;
          }

          if (password !== confirmPassword) {
            message.textContent = "Passwords do not match";
            message.className = "message error";
            return;
          }

          // Show loading state
          resetBtn.classList.add("loading");
          resetBtn.querySelector(".btn-text").textContent =
            "Resetting Password...";
          resetBtn.disabled = true;

          // Send reset request
          try {
            const response = await fetch("/api/reset-password", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                token: token,
                newPassword: password,
              }),
            });

            const data = await response.json();

            // Update this section to handle the specific error
            if (data.success) {
              message.textContent = "Password reset successful!";
              message.className = "message success";
              // Redirect to success page after 1.5 seconds
              setTimeout(() => {
                window.location.href = "/api/reset-password-success";
              }, 1500);
            } else {
              // Add specific handling for same password error
              if (
                data.message &&
                data.message.includes("same as your current password")
              ) {
                // Create a more prominent alert
                const alertDiv = document.createElement("div");
                alertDiv.className = "alert-overlay";
                alertDiv.innerHTML = `
                <div class="alert-dialog">
                    <div class="alert-icon">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <h3>Password Cannot Be Reused</h3>
                    <p>Your new password must be different from your current password.</p>
                    <button id="closeAlert" class="alert-btn">OK</button>
                </div>
            `;
                document.body.appendChild(alertDiv);

                // Add click handler to close button
                document
                  .getElementById("closeAlert")
                  .addEventListener("click", function () {
                    document.body.removeChild(alertDiv);
                  });
              } else {
                // Regular error handling
                message.textContent =
                  data.message || "Failed to reset password";
                message.className = "message error";
              }
            }
          } catch (error) {
            // Remove loading state
            resetBtn.classList.remove("loading");
            resetBtn.querySelector(".btn-text").textContent =
              "Reset My Password";
            resetBtn.disabled = false;

            message.textContent = "An error occurred. Please try again.";
            message.className = "message error";
            console.error("Reset error:", error);
          }
        });
      });
    </script>
  </body>
</html>
